spring.application.name=multiplayer

# MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/multiplayer_games_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

# WARNING: Do not commit real credentials. Set DB_PASSWORD via environment variables or a local excluded properties file.
